version: 0.2

# Environment variables can be defined here or pulled from CodeBuild console
env:
  variables:
    AWS_DEFAULT_REGION: "us-east-1"
    LOG_LEVEL: "INFO"
    BUILD_OUTPUT_DIR: "build-output"
  parameter-store:
    # Sensitive values stored in AWS Systems Manager Parameter Store
    DB_PASSWORD: "/myapp/db/password"

phases:
  # Phase 1: Install dependencies and tools
  install:
    runtime-versions:
      python: 3.11
    on-failure: ABORT  # Stop immediately if install fails
    commands:
      - echo "Installing dependencies..."
      # - pip install --upgrade pip
      # - pip install -r requirements.txt
      # - echo "Dependencies installed successfully"

  # Phase 2: Pre-build - Run validations, tests, setup
  pre_build:
    on-failure: ABORT  # Fail the build if tests or lint fail
    commands:
      - echo "Starting pre-build phase..."
      # - echo "Running linting..."
      # - pylint src/ --exit-zero  # Report issues but don't abort
      - echo "Running unit tests with coverage..."
      # - pytest tests/ --cov=src --cov-report=xml:coverage-report.xml --junitxml=test-report.xml
      - echo "Pre-build checks completed"

  # Phase 3: Build - Main application build
  build:
    on-failure: ABORT
    commands:
      - echo "Build started on $(date)"
      - python app.py
      - echo "Build completed on $(date)"

  # Phase 4: Post-build - Package, deploy, or upload artifacts
  post_build:
    commands:
      - echo "Packaging application..."
      
# Artifacts - Files to keep from the build
artifacts:
  files:
  
# Cache - Speed up builds by caching dependencies
cache:

# Reports - Test and coverage reports
reports:
