AWSTemplateFormatVersion: "2010-09-09"
Description: Creates an S3 bucket for storing CodeBuild build artifacts

Resources:
  CodeBuildArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: keith-bucket231
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 90

Outputs:
  BucketName:
    Description: The name of the S3 artifacts bucket
    Value: !Ref CodeBuildArtifactsBucket
  BucketArn:
    Description: The ARN of the S3 artifacts bucket
    Value: !GetAtt CodeBuildArtifactsBucket.Arn